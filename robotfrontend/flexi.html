<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FLEXI Activity</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  <style>
    /* ── Base ───────────────────────────────────────── */
    * { box-sizing: border-box; }

    body {
      background: #eef2ff;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      margin: 0;
    }

    /* ── Top Bar ────────────────────────────────────── */
    .topbar {
      background: #1a56a0;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .topbar-back {
      color: white;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: bold;
      padding: 6px 14px;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 8px;
    }
    .topbar-back:hover { color: white; background: rgba(255,255,255,0.15); text-decoration: none; }
    .topbar-title { font-size: 1.2rem; font-weight: bold; letter-spacing: 0.5px; }
    #robotBadge {
      font-size: 0.85rem;
      padding: 4px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.15);
    }

    /* ── Activity Header ────────────────────────────── */
    .activity-header {
      text-align: center;
      padding: 24px 20px 12px;
    }
    .activity-title {
      font-size: 2rem;
      font-weight: bold;
      color: #1a56a0;
      margin-bottom: 6px;
    }
    .activity-instruction {
      font-size: 1.35rem;
      color: #333;
      margin-bottom: 12px;
    }

    /* ── Language Level Selector ────────────────────── */
    .level-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .level-btn {
      padding: 7px 22px;
      border: 2px solid #1a56a0;
      border-radius: 20px;
      font-size: 1rem;
      background: white;
      color: #1a56a0;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.15s;
    }
    .level-btn.active {
      background: #1a56a0;
      color: white;
    }
    .level-btn:hover:not(.active) { background: #e8f0fb; }

    /* ── Visual Scaffold ────────────────────────────── */
    .scaffold-section {
      margin: 10px 20px 6px;
      background: white;
      border: 2px dashed #9dbcf5;
      border-radius: 14px;
      padding: 14px 20px;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
    }
    .scaffold-label {
      font-size: 0.8rem;
      color: #888;
      text-align: center;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .scaffold-slots {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: flex-end;
    }
    .scaffold-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .scaffold-num {
      font-size: 0.75rem;
      color: #aaa;
      font-weight: bold;
    }
    .scaffold-line {
      height: 5px;
      background: #9dbcf5;
      border-radius: 3px;
      min-width: 24px;
    }

    /* ── Items List ─────────────────────────────────── */
    .items-section {
      max-width: 820px;
      margin: 12px auto;
      padding: 0 16px;
    }

    .word-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border: 3px solid #dde3f5;
      border-radius: 14px;
      padding: 12px 14px;
      margin: 8px 0;
      cursor: grab;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      font-size: 1.25rem;
      min-height: 64px;
      user-select: none;
      -webkit-user-select: none;
    }
    .word-item:active { cursor: grabbing; }

    .word-item.dragging {
      opacity: 0.45;
      border-color: #1a56a0;
    }
    .word-item.drag-over {
      border-color: #1a56a0;
      background: #e8f0fb;
      transform: translateY(-3px);
      box-shadow: 0 4px 12px rgba(26,86,160,0.2);
    }
    .word-item.selected {
      border-color: #f39c12;
      background: #fffbf0;
      box-shadow: 0 0 0 3px rgba(243,156,18,0.25);
    }
    .word-item.state-correct {
      border-color: #1a7a4a;
      background: #eafaf1;
    }
    .word-item.state-incorrect {
      border-color: #c0392b;
      background: #fdf2f2;
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .drag-handle {
      color: #bbb;
      font-size: 1.5rem;
      cursor: grab;
      flex-shrink: 0;
      line-height: 1;
    }
    .item-num {
      font-size: 1rem;
      font-weight: bold;
      color: #aaa;
      min-width: 22px;
      flex-shrink: 0;
    }
    .item-img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .item-text-btn {
      flex: 1;
      text-align: left;
      background: none;
      border: none;
      font-size: 1.25rem;
      color: #222;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1.35;
    }
    .item-text-btn:hover { background: #f0f4ff; }

    .speak-btn {
      background: #1a56a0;
      color: white;
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .speak-btn:hover { background: #154583; }
    .speak-btn:active { transform: scale(0.92); }

    .arrow-btns {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
    }
    .arrow-btn {
      background: #e8ecf5;
      border: none;
      border-radius: 5px;
      width: 34px;
      height: 28px;
      font-size: 0.85rem;
      cursor: pointer;
      color: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }
    .arrow-btn:hover:not(:disabled) { background: #1a56a0; color: white; }
    .arrow-btn:disabled { opacity: 0.28; cursor: not-allowed; }

    /* ── Action Bar ─────────────────────────────────── */
    .action-bar {
      text-align: center;
      padding: 20px;
    }
    .check-btn {
      background: #1a56a0;
      color: white;
      border: none;
      border-radius: 32px;
      padding: 16px 52px;
      font-size: 1.4rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(26,86,160,0.35);
      transition: all 0.15s;
    }
    .check-btn:hover {
      background: #154583;
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(26,86,160,0.4);
    }
    .check-btn:active { transform: translateY(0); }

    /* ── Feedback Overlay ───────────────────────────── */
    .feedback-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .feedback-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .feedback-overlay.overlay-correct { background: rgba(20,110,60,0.88); }
    .feedback-overlay.overlay-stuck   { background: rgba(70,70,80,0.88); }

    .feedback-card {
      background: white;
      border-radius: 24px;
      padding: 36px 48px;
      text-align: center;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    }
    .feedback-emoji { font-size: 4.5rem; margin-bottom: 12px; }
    .feedback-title { font-size: 1.9rem; font-weight: bold; color: #222; margin-bottom: 8px; }
    .feedback-sub   { font-size: 1.1rem; color: #555; margin-bottom: 24px; }
    .feedback-action-btn {
      border: none;
      border-radius: 24px;
      padding: 13px 38px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
    }
    .feedback-action-btn.btn-continue {
      background: #1a56a0;
      color: white;
    }
    .feedback-action-btn.btn-tryagain {
      background: #f39c12;
      color: white;
    }
    .feedback-action-btn:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ── Teacher Panel ───────────────────────────────── */
    .teacher-toggle {
      position: fixed;
      bottom: 22px;
      right: 22px;
      background: #34495e;
      color: white;
      border: none;
      border-radius: 50%;
      width: 54px;
      height: 54px;
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 700;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .teacher-toggle:hover { background: #2c3e50; }

    .teacher-panel {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 310px;
      background: #fff;
      border-top-left-radius: 18px;
      border-left: 3px solid #34495e;
      border-top: 3px solid #34495e;
      padding: 18px;
      z-index: 800;
      display: none;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: -4px -4px 24px rgba(0,0,0,0.15);
    }
    .teacher-panel.open { display: block; }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .panel-header strong { font-size: 1.05rem; color: #333; }
    .panel-close {
      border: none;
      background: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #666;
      line-height: 1;
    }

    .robot-status-bar {
      background: #f5f6fa;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-on  { background: #2ecc71; }
    .dot-off { background: #e74c3c; }

    .panel-section { margin-bottom: 14px; }
    .panel-section h4 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 7px;
    }

    .activity-select {
      width: 100%;
      padding: 8px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    .ctrl-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 9px 12px;
      margin-bottom: 7px;
      border: 2px solid #dde;
      border-radius: 9px;
      background: white;
      font-size: 0.95rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.12s;
    }
    .ctrl-btn:hover { background: #f0f4ff; border-color: #1a56a0; }

    .upload-drop {
      border: 2px dashed #9dbcf5;
      border-radius: 9px;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      font-size: 0.9rem;
      color: #666;
      transition: all 0.15s;
      margin-bottom: 7px;
    }
    .upload-drop:hover { border-color: #1a56a0; background: #f0f4ff; }

    .link-row {
      display: flex;
      gap: 6px;
      margin-bottom: 7px;
    }
    .link-input {
      flex: 1;
      padding: 7px;
      border: 2px solid #ddd;
      border-radius: 7px;
      font-size: 0.88rem;
    }
    .link-add-btn {
      padding: 7px 12px;
      background: #1a56a0;
      color: white;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.88rem;
    }

    .resource-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .resource-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #eee;
      font-size: 0.85rem;
    }
    .resource-item a { color: #1a56a0; text-decoration: none; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .resource-remove {
      border: none;
      background: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 1rem;
      flex-shrink: 0;
      margin-left: 6px;
    }

    /* ── Mobile ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .activity-title { font-size: 1.5rem; }
      .activity-instruction { font-size: 1.15rem; }
      .word-item { font-size: 1.1rem; padding: 10px 10px; }
      .item-text-btn { font-size: 1.1rem; }
      .check-btn { font-size: 1.2rem; padding: 14px 36px; }
      .teacher-panel { width: 100%; border-radius: 0; border-left: none; }
      .feedback-card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <a class="topbar-back" href="index.html">&#8592; Back</a>
    <span class="topbar-title">FLEXI Activity</span>
    <span id="robotBadge">&#9888; No robot</span>
  </div>

  <!-- Activity header -->
  <div class="activity-header">
    <div class="activity-title" id="activityTitle">Loading...</div>
    <div class="activity-instruction" id="activityInstruction">Get ready!</div>

    <!-- Language level selector -->
    <div class="level-bar">
      <button class="level-btn" data-level="word" onclick="setLanguageLevel('word')">Word</button>
      <button class="level-btn" data-level="phrase" onclick="setLanguageLevel('phrase')">Phrase</button>
      <button class="level-btn active" data-level="sentence" onclick="setLanguageLevel('sentence')">Sentence</button>
    </div>
  </div>

  <!-- Visual scaffolding (blank-line hints matching word/sentence lengths) -->
  <div class="scaffold-section" id="scaffoldSection">
    <div class="scaffold-label">Put them in this order &#8595;</div>
    <div class="scaffold-slots" id="scaffoldSlots"></div>
  </div>

  <!-- Draggable word / sentence items -->
  <div class="items-section" id="itemsSection"></div>

  <!-- Check answer button -->
  <div class="action-bar">
    <button class="check-btn" id="checkBtn" onclick="checkAnswer()">&#10003; Check Answer</button>
  </div>

  <!-- Feedback overlay -->
  <div class="feedback-overlay" id="feedbackOverlay">
    <div class="feedback-card">
      <div class="feedback-emoji" id="fbEmoji"></div>
      <div class="feedback-title" id="fbTitle"></div>
      <div class="feedback-sub"   id="fbSub"></div>
      <button class="feedback-action-btn" id="fbBtn" onclick="onFeedbackBtn()"></button>
    </div>
  </div>

  <!-- Teacher panel toggle -->
  <button class="teacher-toggle" onclick="togglePanel()" title="Teacher Controls">&#9881;</button>

  <!-- Teacher panel -->
  <div class="teacher-panel" id="teacherPanel">
    <div class="panel-header">
      <strong>&#128100; Teacher Controls</strong>
      <button class="panel-close" onclick="togglePanel()">&#10005;</button>
    </div>

    <!-- Robot connection status -->
    <div class="robot-status-bar">
      <span class="status-dot dot-off" id="statusDot"></span>
      <span id="statusText">Robot not connected</span>
    </div>

    <!-- Activity selection -->
    <div class="panel-section">
      <h4>Activity</h4>
      <select class="activity-select" id="activitySelect" onchange="loadActivity(+this.value)"></select>
    </div>

    <!-- Language level -->
    <div class="panel-section">
      <h4>Language Level</h4>
      <div style="display:flex;gap:6px;">
        <button class="ctrl-btn" style="padding:7px;justify-content:center;" onclick="setLanguageLevel('word')">Word</button>
        <button class="ctrl-btn" style="padding:7px;justify-content:center;" onclick="setLanguageLevel('phrase')">Phrase</button>
        <button class="ctrl-btn" style="padding:7px;justify-content:center;" onclick="setLanguageLevel('sentence')">Sentence</button>
      </div>
    </div>

    <!-- Activity controls -->
    <div class="panel-section">
      <h4>Controls</h4>
      <button class="ctrl-btn" onclick="teacherReset()">&#128260; Reset</button>
      <button class="ctrl-btn" onclick="teacherRepeat()">&#128257; Repeat Instructions</button>
      <button class="ctrl-btn" onclick="teacherSkip()">&#9197; Skip to Next</button>
      <button class="ctrl-btn" onclick="teacherTryAgain()">&#128170; Try Again</button>
    </div>

    <!-- Static content upload -->
    <div class="panel-section">
      <h4>Teacher Materials</h4>
      <div class="upload-drop" onclick="document.getElementById('fileInput').click()">
        &#128193; Upload PDF or Image
        <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.gif" multiple style="display:none" onchange="handleUpload(event)">
      </div>
      <div class="link-row">
        <input class="link-input" type="url" id="linkInput" placeholder="Paste a link...">
        <button class="link-add-btn" onclick="addLink()">Add</button>
      </div>
      <ul class="resource-list" id="resourceList"></ul>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  <script src="../robotbackend/scripts/config.js"></script>
  <script src="../databasejs/scripts/database.js"></script>
  <script src="../robotapijs/scripts/robotapi.js"></script>
  <script src="scripts/flexi.js"></script>
</body>
</html>
